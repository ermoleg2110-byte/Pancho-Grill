{% extends 'base.html' %}

{% block content %}
<section class="container py-5">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card contact-card p-4 bg-dark text-white h-100">
                <h1 class="section-title mb-4">Контакты</h1>
                <div class="d-flex flex-column gap-3">
                    <div>
                        <div class="text-white-50 small">Город</div>
                        <div class="fs-5">{{ contacts.city }}</div>
                    </div>
                    <div>
                        <div class="text-white-50 small">Адрес</div>
                        <div class="fs-5">{{ contacts.address }}</div>
                    </div>
                    <div>
                        <div class="text-white-50 small">Телефон</div>
                        <div class="fs-5">{{ contacts.phone }}</div>
                    </div>
                    <div>
                        <div class="text-white-50 small">График</div>
                        <div class="fs-5">{{ contacts.schedule }}</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card contact-card p-4 bg-white h-100">
                <h2 class="section-title mb-3">Где мы находимся?</h2>
                <p class="text-muted">Мы на карте</p>
                <div class="rounded-4 border d-flex align-items-center justify-content-center" style="min-height: 320px; background: linear-gradient(135deg, #f8f9fa, #ececec);">
                    <iframe src="https://yandex.ru/map-widget/v1/?um=constructor%3A288c2105b57afa122324247de42391e1a68c39482dfb204a2aa7843cacc939bf&amp;source=constructor" width="100%" height="100%" frameborder="0"></iframe>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
